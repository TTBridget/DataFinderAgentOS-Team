<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{ title }}</title>
	<!-- 引入 Layui CSS -->
	<link rel="stylesheet" href="{{ static_url('dist/layui/css/layui.css') }}">
	<!-- 引入 Bootstrap CSS（可选，作为补充） -->
	<link rel="stylesheet" href="{{ static_url('dist/bootstrap/css/bootstrap.min.css') }}">
	<!-- 引入自定义 CSS -->
	<link rel="stylesheet" href="{{ static_url('css/base.css') }}">
</head>
<body>
	<div class="container">
	{% block body %}{% end %}
	</div>
	
	<!-- 引入 Layui JS -->
	<script src="{{ static_url('dist/layui/layui.js') }}"></script>
	<!-- 引入 Bootstrap JS（可选，作为补充） -->
	<script src="{{ static_url('dist/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
	<!-- 引入自定义 JS -->
	<script src="{{ static_url('js/base.js') }}"></script>
</body>
</html>
