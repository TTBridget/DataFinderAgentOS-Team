<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>数智大屏</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts-gl/2.0.9/echarts-gl.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts-wordcloud/2.1.0/echarts-wordcloud.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            color: #e2e8f0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== 全局背景 ===== */
        .dashboard-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(37,99,235,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(139,92,246,0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(16,185,129,0.04) 0%, transparent 70%),
                linear-gradient(180deg, #0a0e1a 0%, #111827 50%, #0a0e1a 100%);
            z-index: -1;
        }
        /* 网格线背景 */
        .dashboard-bg::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(51,65,85,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51,65,85,0.08) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* ===== 顶部标题 ===== */
        .header {
            text-align: center;
            padding: 24px 0 16px;
            position: relative;
        }
        .header h1 {
            font-size: 38px; font-weight: 800;
            letter-spacing: 10px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle {
            color: #64748b; font-size: 13px; margin-top: 6px;
            letter-spacing: 2px;
        }
        .header .clock {
            position: absolute; right: 30px; top: 50%;
            transform: translateY(-50%);
            color: #475569; font-size: 14px;
            font-family: 'Courier New', monospace;
        }
        .header .back-btn {
            position: absolute; left: 30px; top: 50%;
            transform: translateY(-50%);
            color: #64748b; font-size: 14px;
            text-decoration: none;
            padding: 6px 16px;
            border: 1px solid rgba(71,85,105,0.4);
            border-radius: 6px;
            transition: all 0.3s;
        }
        .header .back-btn:hover {
            color: #93c5fd;
            border-color: rgba(93,135,253,0.5);
        }

        /* ===== 核心数字卡片 ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 0 24px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: rgba(15,23,42,0.7);
            border: 1px solid rgba(51,65,85,0.4);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
            transition: border-color 0.3s;
        }
        .stat-card:hover {
            border-color: rgba(59,130,246,0.4);
        }
        .stat-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            border-radius: 12px 12px 0 0;
        }
        .stat-card:nth-child(1)::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .stat-card:nth-child(2)::before { background: linear-gradient(90deg, #10b981, #34d399); }
        .stat-card:nth-child(3)::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .stat-card:nth-child(4)::before { background: linear-gradient(90deg, #ec4899, #f472b6); }

        .stat-card .stat-icon {
            position: absolute; top: 20px; right: 20px;
            font-size: 36px; opacity: 0.15;
        }
        .stat-card .stat-label {
            font-size: 13px; color: #94a3b8;
            margin-bottom: 8px; letter-spacing: 1px;
        }
        .stat-card .stat-number {
            font-size: 42px; font-weight: 800;
            line-height: 1.2;
            font-family: 'DIN Alternate', 'Helvetica Neue', sans-serif;
        }
        .stat-card:nth-child(1) .stat-number { color: #60a5fa; }
        .stat-card:nth-child(2) .stat-number { color: #34d399; }
        .stat-card:nth-child(3) .stat-number { color: #fbbf24; }
        .stat-card:nth-child(4) .stat-number { color: #f472b6; }
        .stat-card .stat-unit {
            font-size: 14px; color: #64748b; margin-left: 4px;
        }

        /* 加载占位 */
        .stat-loading {
            display: inline-block;
            width: 80px; height: 36px;
            background: linear-gradient(90deg, rgba(51,65,85,0.3) 25%, rgba(71,85,105,0.5) 50%, rgba(51,65,85,0.3) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
            vertical-align: middle;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== 图表网格 ===== */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 16px;
            padding: 0 24px 24px;
        }
        .chart-card {
            background: rgba(15,23,42,0.6);
            border: 1px solid rgba(51,65,85,0.4);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
        }
        .chart-card .card-title {
            padding: 12px 16px;
            font-size: 14px; font-weight: 600;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(51,65,85,0.3);
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0;
        }
        .chart-card .card-title::before {
            content: '';
            width: 3px; height: 14px;
            border-radius: 2px;
            background: linear-gradient(180deg, #3b82f6, #8b5cf6);
        }
        .chart-card .card-body {
            flex: 1; padding: 8px;
            position: relative;
            min-height: 0;
        }
        .chart-card .card-body .echart {
            width: 100%; height: 100%;
            min-height: 200px;
        }
        .chart-card .chart-loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #475569; font-size: 14px;
        }
        .chart-card .chart-loading .dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #3b82f6;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .chart-card .chart-loading .dot:nth-child(1) { animation-delay: -0.32s; }
        .chart-card .chart-loading .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 布局 */
        .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-6 { grid-column: span 6; }
        .col-12 { grid-column: span 12; }
        .row-h-280 { min-height: 280px; }
        .row-h-320 { min-height: 320px; }

        /* ===== 3D 地球 ===== */
        #chart-globe { width: 100%; height: 100%; min-height: 300px; }

        /* ===== 响应式 ===== */
        @media (max-width: 1200px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .col-6, .col-4 { grid-column: span 12; }
            .col-3 { grid-column: span 6; }
        }
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: 1fr; }
            .col-3 { grid-column: span 12; }
            .header h1 { font-size: 24px; letter-spacing: 4px; }
            .header .back-btn, .header .clock { display: none; }
        }
    </style>
</head>
<body>
    <div class="dashboard-bg"></div>

    <div class="header">
        <a href="/admin/" class="back-btn">← 返回后台</a>
        <h1>数智大屏</h1>
        <p class="subtitle">DATA INTELLIGENCE DASHBOARD</p>
        <span class="clock" id="clock"></span>
    </div>

    <!-- 核心数字 -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon">📦</div>
            <div class="stat-label">仓库总数</div>
            <div><span class="stat-number" id="num-warehouse"><span class="stat-loading"></span></span><span class="stat-unit">条</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🔌</div>
            <div class="stat-label">数据源总数</div>
            <div><span class="stat-number" id="num-sources"><span class="stat-loading"></span></span><span class="stat-unit">个</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">👤</div>
            <div class="stat-label">用户总数</div>
            <div><span class="stat-number" id="num-users"><span class="stat-loading"></span></span><span class="stat-unit">人</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🔍</div>
            <div class="stat-label">深度采集</div>
            <div><span class="stat-number" id="num-deep"><span class="stat-loading"></span></span><span class="stat-unit">条</span></div>
        </div>
    </div>

    <!-- 图表区 -->
    <div class="chart-grid">
        <!-- 3D 地球 -->
        <div class="chart-card col-6 row-h-320">
            <div class="card-title">3D 地球可视化</div>
            <div class="card-body">
                <div id="chart-globe"></div>
            </div>
        </div>

        <!-- 关键词云 -->
        <div class="chart-card col-6 row-h-320">
            <div class="card-title">关键词云</div>
            <div class="card-body">
                <div id="chart-wordcloud" class="echart"></div>
            </div>
        </div>

        <!-- 采集趋势 + 预测 -->
        <div class="chart-card col-12 row-h-280">
            <div class="card-title">采集趋势与预测</div>
            <div class="card-body">
                <div id="chart-trend" class="echart"></div>
            </div>
        </div>

        <!-- 数据源分布 -->
        <div class="chart-card col-4 row-h-280">
            <div class="card-title">数据源分布</div>
            <div class="card-body">
                <div id="chart-source" class="echart"></div>
            </div>
        </div>

        <!-- 数据仓库状态 -->
        <div class="chart-card col-4 row-h-280">
            <div class="card-title">数据仓库状态</div>
            <div class="card-body">
                <div id="chart-warehouse" class="echart"></div>
            </div>
        </div>

        <!-- 数字员工 -->
        <div class="chart-card col-4 row-h-280">
            <div class="card-title">数字员工</div>
            <div class="card-body">
                <div id="chart-employee" class="echart"></div>
            </div>
        </div>
    </div>

<script>
var charts = {};
var refreshTimer = null;

/* ===== 时钟 ===== */
function updateClock() {
    var d = new Date();
    var pad = function(n) { return n < 10 ? '0' + n : n; };
    document.getElementById('clock').textContent =
        d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
        ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}
setInterval(updateClock, 1000);
updateClock();

/* ===== 数字平滑过渡 ===== */
function animateNumber(el, target) {
    var current = parseInt(el.dataset.value || '0', 10);
    if (current === target) return;
    var start = current;
    var diff = target - start;
    var duration = 800;
    var startTime = performance.now();

    function step(now) {
        var elapsed = now - startTime;
        var progress = Math.min(elapsed / duration, 1);
        // easeOutCubic
        var eased = 1 - Math.pow(1 - progress, 3);
        var val = Math.round(start + diff * eased);
        el.textContent = val.toLocaleString();
        if (progress < 1) {
            requestAnimationFrame(step);
        } else {
            el.dataset.value = target;
        }
    }
    requestAnimationFrame(step);
}

/* ===== 初始化所有图表 ===== */
function initCharts() {
    charts.globe = echarts.init(document.getElementById('chart-globe'));
    charts.wordcloud = echarts.init(document.getElementById('chart-wordcloud'));
    charts.trend = echarts.init(document.getElementById('chart-trend'));
    charts.source = echarts.init(document.getElementById('chart-source'));
    charts.warehouse = echarts.init(document.getElementById('chart-warehouse'));
    charts.employee = echarts.init(document.getElementById('chart-employee'));

    setupGlobe();
    setupWordcloud();
    setupTrend();
    setupSource();
    setupWarehouse();
    setupEmployee();

    window.addEventListener('resize', function() {
        for (var k in charts) { charts[k].resize(); }
    });
}

/* ===== 3D 地球 ===== */
function setupGlobe() {
    var cities = [
        [116.46, 39.92, '北京'], [121.48, 31.22, '上海'],
        [113.26, 23.13, '广州'], [114.07, 22.62, '深圳'],
        [104.06, 30.57, '成都'], [120.19, 30.26, '杭州'],
        [114.31, 30.52, '武汉'], [108.95, 34.27, '西安'],
        [139.69, 35.69, '东京'], [-73.94, 40.67, '纽约'],
        [-0.12, 51.51, '伦敦'], [2.35, 48.86, '巴黎'],
        [151.21, -33.87, '悉尼'], [103.82, 1.35, '新加坡'],
    ];
    var scatterData = cities.map(function(c, i) {
        return {
            name: c[2],
            value: [c[0], c[1], Math.random() * 80 + 20],
            symbolSize: Math.random() * 10 + 6,
            itemStyle: {
                color: ['#3b82f6','#10b981','#f59e0b','#ec4899','#8b5cf6'][i % 5],
                opacity: 0.9,
                shadowBlur: 15,
                shadowColor: 'rgba(59,130,246,0.6)'
            }
        };
    });
    // 连线
    var lines = [];
    for (var i = 1; i < cities.length; i++) {
        lines.push({
            coords: [[cities[0][0], cities[0][1]], [cities[i][0], cities[i][1]]]
        });
    }

    charts.globe.setOption({
        backgroundColor: 'transparent',
        globe: {
            baseTexture: 'https://cdn.bootcdn.net/ajax/libs/echarts-gl/2.0.9/test/data/world.jpg',
            heightTexture: 'https://cdn.bootcdn.net/ajax/libs/echarts-gl/2.0.9/test/data/bathymetry_bw_composite_4k.jpg',
            shading: 'realistic',
            environment: 'none',
            realisticMaterial: { roughness: 0.9, metalness: 0 },
            postEffect: {
                enable: true,
                bloom: { enable: true, bloomIntensity: 0.15 },
                ambientOcclusion: { enable: true, quality: 'high' }
            },
            light: {
                ambient: { intensity: 0.5 },
                main: { intensity: 1.2 },
            },
            viewControl: {
                autoRotate: true,
                autoRotateSpeed: 3,
                distance: 180
            },
            atmosphere: { show: true, offset: 5, color: '#3b82f6', glowPower: 3 }
        },
        series: [{
            type: 'scatter3D',
            coordinateSystem: 'globe',
            blendMode: 'lighter',
            symbolSize: 10,
            data: scatterData
        }, {
            type: 'lines3D',
            coordinateSystem: 'globe',
            blendMode: 'lighter',
            effect: {
                show: true,
                trailWidth: 2,
                trailLength: 0.5,
                trailOpacity: 0.8,
                trailColor: '#60a5fa'
            },
            lineStyle: { width: 1, color: '#3b82f6', opacity: 0.4 },
            data: lines
        }]
    });
}

/* ===== 词云 ===== */
function setupWordcloud() {
    charts.wordcloud.setOption({
        backgroundColor: 'transparent',
        tooltip: {
            backgroundColor: 'rgba(15,23,42,0.9)',
            borderColor: '#334155',
            textStyle: { color: '#fff', fontSize: 13 }
        },
        series: [{
            type: 'wordCloud',
            gridSize: 8,
            sizeRange: [14, 50],
            rotationRange: [-45, 45],
            rotationStep: 45,
            shape: 'circle',
            drawOutOfBound: false,
            textStyle: {
                fontFamily: 'Microsoft YaHei',
                fontWeight: 'bold',
                color: function() {
                    var colors = ['#60a5fa','#34d399','#fbbf24','#f472b6','#a78bfa','#22d3ee','#fb923c'];
                    return colors[Math.floor(Math.random() * colors.length)];
                }
            },
            emphasis: {
                textStyle: { shadowBlur: 10, shadowColor: 'rgba(96,165,250,0.5)' }
            },
            data: []
        }]
    });
}

/* ===== 采集趋势 ===== */
function setupTrend() {
    charts.trend.setOption({
        backgroundColor: 'transparent',
        grid: { left: '2%', right: '3%', bottom: '3%', top: '12%', containLabel: true },
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(15,23,42,0.95)',
            borderColor: '#334155',
            textStyle: { color: '#e2e8f0' }
        },
        legend: {
            data: ['实际采集', '预测'],
            textStyle: { color: '#94a3b8' },
            top: 4, right: 10
        },
        xAxis: {
            type: 'category',
            boundaryGap: false,
            axisLine: { lineStyle: { color: '#334155' } },
            axisLabel: { color: '#64748b', fontSize: 11, rotate: 30 }
        },
        yAxis: {
            type: 'value',
            axisLine: { show: false },
            axisLabel: { color: '#64748b' },
            splitLine: { lineStyle: { color: 'rgba(51,65,85,0.2)' } }
        },
        series: [{
            name: '实际采集',
            type: 'line',
            smooth: true,
            symbol: 'circle',
            symbolSize: 6,
            lineStyle: { color: '#3b82f6', width: 3 },
            itemStyle: { color: '#3b82f6', borderColor: '#fff', borderWidth: 1 },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: 'rgba(59,130,246,0.35)' },
                    { offset: 1, color: 'rgba(59,130,246,0.02)' }
                ])
            },
            data: []
        }, {
            name: '预测',
            type: 'line',
            smooth: true,
            symbol: 'diamond',
            symbolSize: 8,
            lineStyle: { color: '#f59e0b', width: 2, type: 'dashed' },
            itemStyle: { color: '#f59e0b' },
            data: []
        }]
    });
}

/* ===== 数据源分布 ===== */
function setupSource() {
    charts.source.setOption({
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'item',
            backgroundColor: 'rgba(15,23,42,0.95)',
            borderColor: '#334155',
            textStyle: { color: '#e2e8f0' },
            formatter: '{b}: {c} ({d}%)'
        },
        legend: {
            orient: 'horizontal',
            bottom: 0,
            textStyle: { color: '#94a3b8', fontSize: 11 },
            itemWidth: 10,
            itemHeight: 10,
            itemGap: 8
        },
        series: [{
            type: 'pie',
            radius: ['30%', '55%'],
            center: ['50%', '38%'],
            avoidLabelOverlap: true,
            itemStyle: {
                borderRadius: 6,
                borderColor: '#0f172a',
                borderWidth: 2
            },
            label: { show: false },
            emphasis: {
                label: { show: true, fontSize: 13, fontWeight: 'bold', color: '#fff' }
            },
            labelLine: { show: false },
            data: []
        }]
    });
}

/* ===== 数据仓库状态 ===== */
function setupWarehouse() {
    charts.warehouse.setOption({
        backgroundColor: 'transparent',
        grid: { left: '3%', right: '5%', bottom: '3%', top: '15%', containLabel: true },
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(15,23,42,0.95)',
            borderColor: '#334155',
            textStyle: { color: '#e2e8f0' }
        },
        xAxis: {
            type: 'category',
            data: ['已深度采集', '未深度采集'],
            axisLine: { lineStyle: { color: '#334155' } },
            axisLabel: { color: '#94a3b8', fontSize: 12 }
        },
        yAxis: {
            type: 'value',
            axisLine: { show: false },
            axisLabel: { color: '#64748b' },
            splitLine: { lineStyle: { color: 'rgba(51,65,85,0.2)' } }
        },
        series: [{
            type: 'bar',
            barWidth: '40%',
            itemStyle: {
                borderRadius: [6, 6, 0, 0],
                color: function(p) {
                    return p.dataIndex === 0
                        ? new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#10b981' },
                            { offset: 1, color: '#059669' }
                          ])
                        : new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#64748b' },
                            { offset: 1, color: '#475569' }
                          ]);
                }
            },
            label: {
                show: true,
                position: 'top',
                color: '#94a3b8',
                fontSize: 13,
                fontWeight: 'bold'
            },
            data: []
        }]
    });
}

/* ===== 数字员工 ===== */
function setupEmployee() {
    charts.employee.setOption({
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'item',
            backgroundColor: 'rgba(15,23,42,0.95)',
            borderColor: '#334155',
            textStyle: { color: '#e2e8f0' }
        },
        series: [{
            type: 'gauge',
            startAngle: 200,
            endAngle: -20,
            min: 0,
            max: 100,
            splitNumber: 5,
            progress: {
                show: true,
                width: 14,
                roundCap: true,
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                        { offset: 0, color: '#3b82f6' },
                        { offset: 1, color: '#10b981' }
                    ])
                }
            },
            axisLine: {
                roundCap: true,
                lineStyle: { width: 14, color: [[1, 'rgba(51,65,85,0.3)']] }
            },
            pointer: { show: false },
            axisTick: { show: false },
            splitLine: { show: false },
            axisLabel: { show: false },
            detail: {
                valueAnimation: true,
                formatter: '{value}%',
                color: '#e2e8f0',
                fontSize: 28,
                fontWeight: 'bold',
                offsetCenter: [0, '0%']
            },
            title: {
                offsetCenter: [0, '40%'],
                color: '#64748b',
                fontSize: 12
            },
            data: [{ value: 0, name: '员工启用率' }]
        }]
    });
}

/* ===== 数据更新 ===== */
function fetchData() {
    // 核心数字
    fetch('/admin/dashboard/data?action=overview')
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code !== 0) return;
            animateNumber(document.getElementById('num-warehouse'), res.data.total_warehouse);
            animateNumber(document.getElementById('num-sources'), res.data.total_sources);
            animateNumber(document.getElementById('num-users'), res.data.total_users);
            animateNumber(document.getElementById('num-deep'), res.data.deep_collected);
        })
        .catch(function(e) { console.error('overview:', e); });

    // 词云
    fetch('/admin/dashboard/data?action=keyword_cloud')
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code !== 0) return;
            if (res.data.length === 0) {
                charts.wordcloud.setOption({
                    title: {
                        text: '暂无关键词数据',
                        left: 'center', top: 'center',
                        textStyle: { color: '#475569', fontSize: 14, fontWeight: 'normal' }
                    }
                });
                return;
            }
            charts.wordcloud.setOption({
                title: { text: '' },
                series: [{ data: res.data }]
            });
        })
        .catch(function(e) { console.error('wordcloud:', e); });

    // 采集趋势
    fetch('/admin/dashboard/data?action=collect_trend')
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code !== 0) return;
            var dates = [], actual = [], predicted = [];
            res.data.forEach(function(d) {
                dates.push(d.date.substring(5));
                if (d.predicted) {
                    predicted.push(d.count);
                    actual.push(null);
                } else {
                    actual.push(d.count);
                    predicted.push(null);
                }
            });
            // 连接最后一个实际值到预测值
            for (var i = 0; i < actual.length; i++) {
                if (actual[i] === null && i > 0 && actual[i-1] !== null) {
                    predicted[i-1] = actual[i-1];
                    break;
                }
            }
            charts.trend.setOption({
                xAxis: { data: dates },
                series: [{ data: actual }, { data: predicted }]
            });
        })
        .catch(function(e) { console.error('trend:', e); });

    // 数据源分布
    fetch('/admin/dashboard/data?action=source_stats')
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code !== 0) return;
            var colors = ['#3b82f6','#10b981','#f59e0b','#ec4899','#8b5cf6','#06b6d4','#fb923c'];
            var pieData = res.data.map(function(item, i) {
                return {
                    name: item.name,
                    value: item.count,
                    itemStyle: { color: colors[i % colors.length] }
                };
            });
            charts.source.setOption({ series: [{ data: pieData }] });
        })
        .catch(function(e) { console.error('source:', e); });

    // 仓库状态
    fetch('/admin/dashboard/data?action=warehouse_stats')
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code !== 0) return;
            charts.warehouse.setOption({
                series: [{
                    data: [
                        { value: res.data.deep_collected },
                        { value: res.data.not_deep_collected }
                    ]
                }]
            });
        })
        .catch(function(e) { console.error('warehouse:', e); });

    // 数字员工
    fetch('/admin/dashboard/data?action=employee_stats')
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code !== 0) return;
            var rate = res.data.total > 0
                ? Math.round((res.data.enabled / res.data.total) * 100)
                : 0;
            charts.employee.setOption({
                series: [{
                    data: [{
                        value: rate,
                        name: '员工启用率\n(' + res.data.enabled + '/' + res.data.total + ')'
                    }]
                }]
            });
        })
        .catch(function(e) { console.error('employee:', e); });
}

/* ===== 启动 ===== */
document.addEventListener('DOMContentLoaded', function() {
    initCharts();
    fetchData();
    refreshTimer = setInterval(fetchData, 30000);
});
</script>
</body>
</html>
