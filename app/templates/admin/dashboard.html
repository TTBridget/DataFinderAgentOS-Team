{% extends "base.html" %}

{% block body %}
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0e17;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    color: #fff;
    overflow-x: hidden;
}

.dashboard-container {
    min-height: 100vh;
    padding: 20px;
    background: linear-gradient(135deg, #0a0e17 0%, #1a1f35 50%, #0a0e17 100%);
    position: relative;
}

.dashboard-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        radial-gradient(circle at 20% 80%, rgba(37, 99, 235, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.03) 0%, transparent 70%);
    pointer-events: none;
}

.header {
    text-align: center;
    padding: 20px 0;
    position: relative;
    z-index: 10;
}

.header h1 {
    font-size: 36px;
    font-weight: 700;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 8px;
}

.header p {
    color: #94a3b8;
    margin-top: 8px;
    font-size: 14px;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-auto-rows: minmax(200px, auto);
    gap: 16px;
    position: relative;
    z-index: 10;
}

.card {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(51, 65, 85, 0.5);
    border-radius: 12px;
    backdrop-filter: blur(10px);
    overflow: hidden;
    transition: all 0.3s ease;
}

.card:hover {
    border-color: rgba(59, 130, 246, 0.5);
    box-shadow: 0 0 30px rgba(59, 130, 246, 0.1);
}

.card-header {
    padding: 12px 16px;
    background: rgba(30, 41, 59, 0.5);
    border-bottom: 1px solid rgba(51, 65, 85, 0.3);
    font-size: 14px;
    font-weight: 600;
    color: #cbd5e1;
    display: flex;
    align-items: center;
    gap: 8px;
}

.card-header i {
    color: #3b82f6;
}

.card-body {
    padding: 16px;
    height: calc(100% - 52px);
}

.stat-card {
    grid-column: span 3;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.stat-value {
    font-size: 42px;
    font-weight: 700;
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.stat-label {
    font-size: 14px;
    color: #94a3b8;
    margin-top: 8px;
}

.stat-card:nth-child(2) .stat-value {
    background: linear-gradient(135deg, #10b981, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.stat-card:nth-child(3) .stat-value {
    background: linear-gradient(135deg, #f59e0b, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.stat-card:nth-child(4) .stat-value {
    background: linear-gradient(135deg, #ec4899, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.chart-card {
    grid-column: span 6;
}

.chart-card-full {
    grid-column: span 12;
}

.chart-card-half {
    grid-column: span 4;
}

.globe-card {
    grid-column: span 6;
    grid-row: span 2;
}

.wordcloud-card {
    grid-column: span 6;
}

#globeChart {
    width: 100%;
    height: 100%;
    min-height: 400px;
}

.chart-container {
    width: 100%;
    height: calc(100% - 20px);
    min-height: 200px;
}

@media (max-width: 1200px) {
    .stat-card {
        grid-column: span 6;
    }
    .chart-card {
        grid-column: span 12;
    }
    .globe-card {
        grid-column: span 12;
    }
    .wordcloud-card {
        grid-column: span 12;
    }
    .chart-card-half {
        grid-column: span 6;
    }
}

@media (max-width: 768px) {
    .header h1 {
        font-size: 24px;
        letter-spacing: 4px;
    }
    .stat-card {
        grid-column: span 12;
    }
    .chart-card-half {
        grid-column: span 12;
    }
}
</style>

<div class="dashboard-container">
    <div class="header">
        <h1>📊 数智大屏</h1>
        <p>数据采集与系统运营实时监控中心</p>
    </div>

    <div class="grid-container">
        <div class="card stat-card">
            <div class="card-header"><i class="layui-icon layui-icon-data"></i> 仓库总数</div>
            <div class="card-body">
                <div class="stat-value" id="stat-warehouse">--</div>
                <div class="stat-label">条</div>
            </div>
        </div>

        <div class="card stat-card">
            <div class="card-header"><i class="layui-icon layui-icon-database"></i> 数据源</div>
            <div class="card-body">
                <div class="stat-value" id="stat-sources">--</div>
                <div class="stat-label">个</div>
            </div>
        </div>

        <div class="card stat-card">
            <div class="card-header"><i class="layui-icon layui-icon-praise"></i> 深度采集</div>
            <div class="card-body">
                <div class="stat-value" id="stat-deep">--</div>
                <div class="stat-label">条</div>
            </div>
        </div>

        <div class="card stat-card">
            <div class="card-header"><i class="layui-icon layui-icon-user"></i> 用户总数</div>
            <div class="card-body">
                <div class="stat-value" id="stat-users">--</div>
                <div class="stat-label">人</div>
            </div>
        </div>

        <div class="card globe-card">
            <div class="card-header"><i class="layui-icon layui-icon-website"></i> 3D 地球可视化</div>
            <div class="card-body">
                <div id="globeChart"></div>
            </div>
        </div>

        <div class="card wordcloud-card">
            <div class="card-header"><i class="layui-icon layui-icon-fonts"></i> 关键词云</div>
            <div class="card-body">
                <div class="chart-container" id="wordcloudChart"></div>
            </div>
        </div>

        <div class="card chart-card">
            <div class="card-header"><i class="layui-icon layui-icon-line"></i> 采集趋势</div>
            <div class="card-body">
                <div class="chart-container" id="trendChart"></div>
            </div>
        </div>

        <div class="card chart-card">
            <div class="card-header"><i class="layui-icon layui-icon-pie"></i> 数据源分布</div>
            <div class="card-body">
                <div class="chart-container" id="sourceChart"></div>
            </div>
        </div>

        <div class="card chart-card-half">
            <div class="card-header"><i class="layui-icon layui-icon-table"></i> 数据仓库状态</div>
            <div class="card-body">
                <div class="chart-container" id="warehouseChart"></div>
            </div>
        </div>

        <div class="card chart-card-half">
            <div class="card-header"><i class="layui-icon layui-icon-user"></i> 用户统计</div>
            <div class="card-body">
                <div class="chart-container" id="userChart"></div>
            </div>
        </div>

        <div class="card chart-card-half">
            <div class="card-header"><i class="layui-icon layui-icon-robot"></i> 数字员工</div>
            <div class="card-body">
                <div class="chart-container" id="employeeChart"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>

<script>
var charts = {};
var updateInterval = null;

function initCharts() {
    charts.globe = echarts.init(document.getElementById('globeChart'));
    charts.wordcloud = echarts.init(document.getElementById('wordcloudChart'));
    charts.trend = echarts.init(document.getElementById('trendChart'));
    charts.source = echarts.init(document.getElementById('sourceChart'));
    charts.warehouse = echarts.init(document.getElementById('warehouseChart'));
    charts.user = echarts.init(document.getElementById('userChart'));
    charts.employee = echarts.init(document.getElementById('employeeChart'));

    initGlobeChart();
    initWordcloudChart();
    initTrendChart();
    initSourceChart();
    initWarehouseChart();
    initUserChart();
    initEmployeeChart();

    window.addEventListener('resize', function() {
        for (var key in charts) {
            charts[key].resize();
        }
    });
}

function initGlobeChart() {
    var option = {
        backgroundColor: 'transparent',
        globe: {
            baseTexture: 'https://cdn.jsdelivr.net/gh/apache/echarts-gl@main/test/data/world.jpg',
            heightTexture: 'https://cdn.jsdelivr.net/gh/apache/echarts-gl@main/test/data/bathymetry_bw_composite_4k.jpg',
            shading: 'realistic',
            environment: 'none',
            realisticMaterial: {
                roughness: 0.8,
                metalness: 0.1
            },
            postEffect: {
                enable: true,
                bloom: {
                    enable: true,
                    bloomIntensity: 0.1
                },
                ambientOcclusion: {
                    enable: true,
                    quality: 'high'
                }
            },
            light: {
                ambient: {
                    intensity: 0.4
                },
                directional: {
                    intensity: 0.8
                },
                pointLight: {
                    enable: true,
                    intensity: 0.5
                }
            },
            viewControl: {
                autoRotate: true,
                autoRotateSpeed: 2,
                distance: 180,
                minDistance: 100,
                maxDistance: 300
            },
            layers: [{
                type: 'atmosphere',
                effect: 'blend',
                color: '#3b82f6',
                opacity: 0.3
            }]
        },
        series: [{
            type: 'scatter3D',
            coordinateSystem: 'globe',
            symbolSize: 8,
            itemStyle: {
                color: '#3b82f6',
                shadowBlur: 10,
                shadowColor: 'rgba(59, 130, 246, 0.5)'
            },
            data: []
        }]
    };
    charts.globe.setOption(option);
}

function updateGlobeData(data) {
    var locations = [
        { name: '北京', coord: [116.46, 39.92], value: 100 },
        { name: '上海', coord: [121.48, 31.22], value: 80 },
        { name: '广州', coord: [113.26, 23.13], value: 60 },
        { name: '深圳', coord: [114.07, 22.62], value: 50 },
        { name: '成都', coord: [104.06, 30.57], value: 40 },
        { name: '杭州', coord: [120.19, 30.26], value: 35 },
        { name: '武汉', coord: [114.31, 30.52], value: 30 },
        { name: '西安', coord: [108.95, 34.27], value: 25 },
        { name: '东京', coord: [139.69, 35.69], value: 20 },
        { name: '纽约', coord: [-73.94, 40.67], value: 15 },
        { name: '伦敦', coord: [-0.12, 51.51], value: 12 },
        { name: '巴黎', coord: [2.35, 48.86], value: 10 },
        { name: '悉尼', coord: [151.21, -33.87], value: 8 },
        { name: '新加坡', coord: [103.82, 1.35], value: 6 },
    ];

    var scatterData = locations.map(function(item) {
        return {
            name: item.name,
            value: [item.coord[0], item.coord[1], Math.random() * 50 + 50],
            symbolSize: Math.random() * 8 + 5,
            itemStyle: {
                color: ['#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6'][Math.floor(Math.random() * 5)]
            }
        };
    });

    charts.globe.setOption({
        series: [{
            type: 'scatter3D',
            data: scatterData
        }]
    });
}

function initWordcloudChart() {
    var option = {
        backgroundColor: 'transparent',
        series: [{
            type: 'wordCloud',
            gridSize: 8,
            sizeRange: [12, 48],
            rotationRange: [-90, 90],
            rotationStep: 30,
            shape: 'circle',
            drawOutOfBound: false,
            textStyle: {
                fontFamily: 'Microsoft YaHei',
                fontWeight: 'bold',
                color: function() {
                    return 'rgb(' + [
                        Math.round(Math.random() * 160 + 50),
                        Math.round(Math.random() * 160 + 50),
                        Math.round(Math.random() * 160 + 50)
                    ].join(',') + ')';
                }
            },
            emphasis: {
                textStyle: {
                    shadowBlur: 10,
                    shadowColor: 'rgba(0, 0, 0, 0.5)'
                }
            },
            data: []
        }]
    };
    charts.wordcloud.setOption(option);
}

function updateWordcloudData(data) {
    charts.wordcloud.setOption({
        series: [{
            data: data
        }]
    });
}

function initTrendChart() {
    var option = {
        backgroundColor: 'transparent',
        grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            top: '10%',
            containLabel: true
        },
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(15, 23, 42, 0.9)',
            borderColor: '#334155',
            textStyle: { color: '#fff' }
        },
        xAxis: {
            type: 'category',
            boundaryGap: false,
            axisLine: { lineStyle: { color: '#334155' } },
            axisLabel: { color: '#94a3b8', fontSize: 11 }
        },
        yAxis: {
            type: 'value',
            axisLine: { lineStyle: { color: '#334155' } },
            axisLabel: { color: '#94a3b8' },
            splitLine: { lineStyle: { color: 'rgba(51, 65, 85, 0.3)' } }
        },
        series: [{
            type: 'line',
            smooth: true,
            symbol: 'circle',
            symbolSize: 6,
            lineStyle: { color: '#3b82f6', width: 3 },
            itemStyle: { color: '#3b82f6' },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: 'rgba(59, 130, 246, 0.3)' },
                    { offset: 1, color: 'rgba(59, 130, 246, 0.05)' }
                ])
            },
            data: []
        }]
    };
    charts.trend.setOption(option);
}

function updateTrendData(data) {
    var dates = data.map(function(item) { return item.date; });
    var counts = data.map(function(item) { return item.count; });

    charts.trend.setOption({
        xAxis: { data: dates },
        series: [{ data: counts }]
    });
}

function initSourceChart() {
    var option = {
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'item',
            backgroundColor: 'rgba(15, 23, 42, 0.9)',
            borderColor: '#334155',
            textStyle: { color: '#fff' }
        },
        legend: {
            orient: 'horizontal',
            bottom: '5%',
            textStyle: { color: '#94a3b8' }
        },
        series: [{
            type: 'pie',
            radius: ['40%', '70%'],
            center: ['50%', '45%'],
            avoidLabelOverlap: true,
            itemStyle: {
                borderRadius: 8,
                borderColor: '#0f172a',
                borderWidth: 2
            },
            label: {
                show: false
            },
            emphasis: {
                label: {
                    show: true,
                    fontSize: 14,
                    fontWeight: 'bold',
                    color: '#fff'
                }
            },
            labelLine: { show: false },
            data: []
        }]
    };
    charts.source.setOption(option);
}

function updateSourceData(data) {
    var colors = ['#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#06b6d4', '#84cc16'];
    var pieData = data.map(function(item, index) {
        return {
            name: item.name,
            value: item.count,
            itemStyle: { color: colors[index % colors.length] }
        };
    });

    charts.source.setOption({
        series: [{ data: pieData }]
    });
}

function initWarehouseChart() {
    var option = {
        backgroundColor: 'transparent',
        grid: {
            left: '10%',
            right: '10%',
            bottom: '5%',
            top: '15%',
            containLabel: true
        },
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(15, 23, 42, 0.9)',
            borderColor: '#334155',
            textStyle: { color: '#fff' }
        },
        xAxis: {
            type: 'category',
            data: ['已深度采集', '未深度采集'],
            axisLine: { lineStyle: { color: '#334155' } },
            axisLabel: { color: '#94a3b8' }
        },
        yAxis: {
            type: 'value',
            axisLine: { lineStyle: { color: '#334155' } },
            axisLabel: { color: '#94a3b8' },
            splitLine: { lineStyle: { color: 'rgba(51, 65, 85, 0.3)' } }
        },
        series: [{
            type: 'bar',
            barWidth: '50%',
            itemStyle: {
                borderRadius: [4, 4, 0, 0],
                color: function(params) {
                    return params.dataIndex === 0 ? '#10b981' : '#64748b';
                }
            },
            data: []
        }]
    };
    charts.warehouse.setOption(option);
}

function updateWarehouseData(data) {
    charts.warehouse.setOption({
        series: [{
            data: [data.deep_collected, data.not_deep_collected]
        }]
    });
}

function initUserChart() {
    var option = {
        backgroundColor: 'transparent',
        grid: {
            left: '10%',
            right: '10%',
            bottom: '5%',
            top: '15%',
            containLabel: true
        },
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(15, 23, 42, 0.9)',
            borderColor: '#334155',
            textStyle: { color: '#fff' }
        },
        xAxis: {
            type: 'category',
            data: ['普通用户', '管理员'],
            axisLine: { lineStyle: { color: '#334155' } },
            axisLabel: { color: '#94a3b8' }
        },
        yAxis: {
            type: 'value',
            axisLine: { lineStyle: { color: '#334155' } },
            axisLabel: { color: '#94a3b8' },
            splitLine: { lineStyle: { color: 'rgba(51, 65, 85, 0.3)' } }
        },
        series: [{
            name: '启用',
            type: 'bar',
            stack: 'total',
            barWidth: '50%',
            itemStyle: {
                borderRadius: [4, 4, 0, 0],
                color: '#10b981'
            },
            data: []
        }, {
            name: '禁用',
            type: 'bar',
            stack: 'total',
            barWidth: '50%',
            itemStyle: {
                borderRadius: [4, 4, 0, 0],
                color: '#ef4444'
            },
            data: []
        }]
    };
    charts.user.setOption(option);
}

function updateUserData(data) {
    charts.user.setOption({
        series: [{
            data: [data.user_enabled, data.admin_enabled]
        }, {
            data: [data.user_disabled, data.admin_disabled]
        }]
    });
}

function initEmployeeChart() {
    var option = {
        backgroundColor: 'transparent',
        tooltip: {
            trigger: 'item',
            backgroundColor: 'rgba(15, 23, 42, 0.9)',
            borderColor: '#334155',
            textStyle: { color: '#fff' }
        },
        series: [{
            type: 'gauge',
            startAngle: 200,
            endAngle: -20,
            min: 0,
            max: 100,
            splitNumber: 5,
            axisLine: {
                lineStyle: {
                    width: 12,
                    color: [
                        [0.3, '#ef4444'],
                        [0.7, '#f59e0b'],
                        [1, '#10b981']
                    ]
                }
            },
            pointer: {
                itemStyle: { color: '#fff' },
                length: '60%',
                width: 4
            },
            axisTick: { show: false },
            splitLine: {
                length: 10,
                lineStyle: { color: '#fff', width: 2 }
            },
            axisLabel: {
                color: '#94a3b8',
                distance: 20,
                fontSize: 10
            },
            detail: {
                valueAnimation: true,
                formatter: '{value}%',
                color: '#fff',
                fontSize: 20,
                fontWeight: 'bold'
            },
            title: {
                offsetCenter: [0, '75%'],
                color: '#94a3b8',
                fontSize: 12
            },
            data: [{
                value: 0,
                name: '员工启用率'
            }]
        }]
    };
    charts.employee.setOption(option);
}

function updateEmployeeData(data) {
    var rate = data.total > 0 ? Math.round((data.enabled / data.total) * 100) : 0;
    charts.employee.setOption({
        series: [{
            data: [{ value: rate, name: '员工启用率' }]
        }]
    });
}

function fetchData() {
    fetch('/admin/dashboard/data?action=overview')
        .then(res => res.json())
        .then(res => {
            if (res.code === 0) {
                document.getElementById('stat-warehouse').textContent = res.data.total_warehouse;
                document.getElementById('stat-sources').textContent = res.data.total_sources;
                document.getElementById('stat-deep').textContent = res.data.deep_collected;
                document.getElementById('stat-users').textContent = res.data.total_users + res.data.total_admins;
            }
        })
        .catch(err => console.error('Overview fetch error:', err));

    fetch('/admin/dashboard/data?action=keyword_cloud')
        .then(res => res.json())
        .then(res => { if (res.code === 0) updateWordcloudData(res.data); })
        .catch(err => console.error('Keyword cloud fetch error:', err));

    fetch('/admin/dashboard/data?action=collect_trend')
        .then(res => res.json())
        .then(res => { if (res.code === 0) updateTrendData(res.data); })
        .catch(err => console.error('Trend fetch error:', err));

    fetch('/admin/dashboard/data?action=source_stats')
        .then(res => res.json())
        .then(res => { if (res.code === 0) updateSourceData(res.data); })
        .catch(err => console.error('Source stats fetch error:', err));

    fetch('/admin/dashboard/data?action=warehouse_stats')
        .then(res => res.json())
        .then(res => { if (res.code === 0) updateWarehouseData(res.data); })
        .catch(err => console.error('Warehouse stats fetch error:', err));

    fetch('/admin/dashboard/data?action=user_stats')
        .then(res => res.json())
        .then(res => { if (res.code === 0) updateUserData(res.data); })
        .catch(err => console.error('User stats fetch error:', err));

    fetch('/admin/dashboard/data?action=employee_stats')
        .then(res => res.json())
        .then(res => { if (res.code === 0) updateEmployeeData(res.data); })
        .catch(err => console.error('Employee stats fetch error:', err));

    updateGlobeData();
}

document.addEventListener('DOMContentLoaded', function() {
    initCharts();
    fetchData();
    updateInterval = setInterval(fetchData, 30000);
});

</script>
{% end %}
